name: Install Command Preflight

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  postinstall-build-command:
    name: Postinstall build command (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies without lifecycle scripts
        run: npm ci --ignore-scripts

      - name: Verify postinstall build command
        run: npm run check:postinstall-build

      - name: Verify package contents
        run: npm run check:package
